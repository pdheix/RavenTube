name: RavenTube - JSON Downloader

on:
  push:
    paths:
      - 'download.json'
  workflow_dispatch:

jobs:
  download:
    name: Download from JSON
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Install deno (JS runtime)
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Start WARP proxy
        run: |
          docker network create warp-net || true
          docker run -d --name warp --restart=always --network warp-net \
            -p 1080:1080 --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          sleep 15
          # Verify
          curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace || true

      - name: Download videos from JSON
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/downloader.py

      - name: Stop WARP container
        if: always()
        run: docker stop warp && docker rm warp || true

      - name: Commit and push results
        run: |
          git config user.name  "RavenTube"
          git config user.email "raventube@users.noreply.github.com"
          git add videos/ videos/README.md urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Downloaded from JSON [skip ci]"
            for i in $(seq 1 10); do
              if timeout 300 git push origin HEAD; then break; fi
              sleep 5
              git fetch origin
              git reset --hard origin/$(git rev-parse --abbrev-ref HEAD)
            done
          fi

      - name: Summary
        run: |
          echo "=========================================="
          echo "Downloads complete: ${{ github.repository }}"
          echo "=========================================="
