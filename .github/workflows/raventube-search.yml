name: RavenTube - YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'Video URLs (space separated)'
        required: true
        type: string
      quality:
        description: 'Quality'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: 'ZIP password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: Download YouTube Videos
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "RavenTube"
          git config user.email "raventube@github.com"
          git config --global http.postBuffer 524288000

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          pip install yt-dlp

      - name: Download videos
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          URLS_RAW="${YT_URLS}"
          read -ra URL_LIST <<< "$URLS_RAW"
          TOTAL_URLS=${#URL_LIST[@]}
          QUALITY="${YT_QUALITY}"
          PASSWORD="${YT_PASSWORD}"
          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          mkdir -p videos
          > /tmp/video_info.txt

          echo "========================================"
          echo "RavenTube Downloader"
          echo "Total URLs: $TOTAL_URLS"
          echo "Quality: $QUALITY"
          echo "========================================"

          sanitize_name() {
            echo "$1" | sed 's/ /-/g' | sed 's/[^a-zA-Z0-9_-]//g' | tr -s '-'
          }

          case "$QUALITY" in
            "audio") FORMAT="bestaudio/best" ;;
            "best")  FORMAT="bestvideo+bestaudio/best" ;;
            "2160")  FORMAT="bestvideo[height<=2160]+bestaudio/best[height<=2160]" ;;
            "1440")  FORMAT="bestvideo[height<=1440]+bestaudio/best[height<=1440]" ;;
            "1080")  FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
            "720")   FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
            "480")   FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
            *)       FORMAT="bestvideo+bestaudio/best" ;;
          esac

          download_video() {
            local METHOD=$1; local URL=$2; local TMP_DIR=$3
            echo "Trying method $METHOD..."

            if [ "$QUALITY" = "audio" ]; then
              COMMON_FLAGS="--extract-audio --audio-format mp3 --audio-quality 0 --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            else
              COMMON_FLAGS="--merge-output-format mp4 --write-thumbnail --convert-thumbnails jpg --no-cache-dir --output ${TMP_DIR}/%(title)s.%(ext)s --no-part --no-playlist --retries 5 --fragment-retries 5 --no-check-certificates --concurrent-fragments 8 --buffer-size 16K --http-chunk-size 10M --progress --newline"
            fi

            case $METHOD in
              1) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web" --js-runtimes deno "$URL" ;;
              2) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=web,mweb" --js-runtimes deno "$URL" ;;
              3) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=mweb" "$URL" ;;
              4) yt-dlp --format "$FORMAT" $COMMON_FLAGS --extractor-args "youtube:player_client=android_vr" "$URL" ;;
              5) yt-dlp --format "$FORMAT" $COMMON_FLAGS "$URL" ;;
            esac
          }

          URL_INDEX=0
          for URL in "${URL_LIST[@]}"; do
            URL_INDEX=$((URL_INDEX + 1))
            echo "============================================================"
            echo "Processing URL $URL_INDEX / $TOTAL_URLS : $URL"
            echo "============================================================"

            TMP_DIR="tmp_downloads_${URL_INDEX}"
            mkdir -p "$TMP_DIR"
            DOWNLOAD_SUCCESS=false

            for METHOD in 1 2 3 4 5; do
              if download_video $METHOD "$URL" "$TMP_DIR"; then
                echo "Download successful with method $METHOD!"
                DOWNLOAD_SUCCESS=true
                break
              else
                echo "Method $METHOD failed, waiting 3 seconds..."
                sleep 3
              fi
            done

            if [ "$DOWNLOAD_SUCCESS" = false ]; then
              echo "All download methods failed for URL: $URL — skipping."
              rm -rf "$TMP_DIR"
              continue
            fi

            find "$TMP_DIR" -name "*.part" -delete

            for FILE in "$TMP_DIR"/*; do
              [ -f "$FILE" ] || continue
              if [[ "$FILE" == *.jpg ]] || [[ "$FILE" == *.webp ]]; then continue; fi

              SIZE=$(stat -c%s "$FILE")
              BASENAME=$(basename "$FILE")
              FILENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              SAFE_NAME=$(sanitize_name "$FILENAME_NO_EXT")

              FOLDER="${SAFE_NAME}_$(date +%s)_$$"
              mkdir -p "videos/$FOLDER"

              THUMB_FILE=$(ls "$TMP_DIR"/*.jpg 2>/dev/null | head -1)
              if [ -n "$THUMB_FILE" ] && [ -f "$THUMB_FILE" ]; then
                cp "$THUMB_FILE" "videos/$FOLDER/thumbnail.jpg"
              fi

              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)

              export BASENAME="$FILENAME_NO_EXT"
              export QUALITY="$QUALITY"
              export SIZE_MB="$SIZE_MB"
              export PASSWORD="$PASSWORD"
              export FOLDER="$FOLDER"
              export SAFE_NAME="$SAFE_NAME"
              export EXT="$EXT"
              export REPO_OWNER="${REPO_OWNER}"
              export REPO_NAME="${REPO_NAME}"
              export BRANCH="${BRANCH}"

              FOLDER_ENC=$(echo "$FOLDER" | sed 's/ /%20/g')

              if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
                SPLIT=1
                export SPLIT="$SPLIT"
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -0 -s ${SPLIT_MB}m "videos/$FOLDER/${SAFE_NAME}.zip" "$FILE"
                else
                  zip -0 -s ${SPLIT_MB}m "videos/$FOLDER/${SAFE_NAME}.zip" "$FILE"
                fi
              else
                SPLIT=0
                export SPLIT="$SPLIT"
                if [ -n "$PASSWORD" ]; then
                  zip -P "$PASSWORD" -0 "videos/$FOLDER/${SAFE_NAME}.zip" "$FILE"
                else
                  cp "$FILE" "videos/$FOLDER/${SAFE_NAME}.${EXT}"
                fi
              fi

              # Write README base content using Python
              python3 -c "
import os
basename = os.environ['BASENAME']
quality = os.environ['QUALITY']
size_mb = os.environ['SIZE_MB']
password = os.environ.get('PASSWORD', '')
folder = os.environ['FOLDER']
has_pass = 'YES' if password else 'NO'

with open(f'videos/{folder}/README.md', 'w') as f:
    f.write(f'''# {basename}

<div align=\"center\">
  <img src=\"thumbnail.jpg\" width=\"250\"/>
</div>

| Property | Value |
|----------|-------|
| **Quality** | {quality} |
| **Size** | {size_mb} MB |
| **Password** | {has_pass} |

## Download Link
''')
"

              if [ "$SPLIT" -eq 1 ]; then
                PARTS=$(ls "videos/$FOLDER/${SAFE_NAME}.zip"* 2>/dev/null | wc -l)
                export PARTS="$PARTS"
                python3 -c "
import os
folder = os.environ['FOLDER']
size_mb = os.environ['SIZE_MB']
parts = os.environ.get('PARTS', '0')
with open(f'videos/{folder}/README.md', 'a') as f:
    f.write(f'| **Total Size** | {size_mb} MB ({parts} parts) |\n\n')
"
                for part in $(ls "videos/$FOLDER/${SAFE_NAME}.zip"* 2>/dev/null | sort -V); do
                  PART_NAME=$(basename "$part")
                  PART_ENC=$(echo "$PART_NAME" | sed 's/ /%20/g')
                  echo "| \`$PART_NAME\` | [Download](https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENC}/${PART_ENC}) |" >> "videos/$FOLDER/README.md"
                done
              else
                FILE_ENC=$(echo "${SAFE_NAME}.${EXT}" | sed 's/ /%20/g')
                echo "| \`${SAFE_NAME}.${EXT}\` | [Download](https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/videos/${FOLDER_ENC}/${FILE_ENC}) |" >> "videos/$FOLDER/README.md"
              fi

              echo "${FILENAME_NO_EXT}|${FOLDER}" >> /tmp/video_info.txt
            done

            rm -rf "$TMP_DIR"
          done

          echo "/tmp/video_info.txt" > /tmp/backup_path.txt

      - name: Commit and push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          # Regenerate master README
          cat > videos/README.md << 'MASTEREOF'
# 🪶 RavenTube Downloads

| # | Video | Folder |
|---|-------|--------|
MASTEREOF

          NUM=0
          while IFS='|' read -r VIDNAME VIDFOLDER; do
            [ -z "$VIDNAME" ] && continue
            NUM=$((NUM + 1))
            FOLDER_ENC=$(echo "$VIDFOLDER" | sed 's/ /%20/g')
            echo "| $NUM | $VIDNAME | [Open](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENC}) |" >> videos/README.md
          done < /tmp/video_info.txt

          git add -f videos/
          git add -f videos/README.md

          if ! git diff --cached --quiet; then
            git commit -m "RavenTube: Download complete [skip ci]"
            PUSH_RETRY=0
            while [ $PUSH_RETRY -lt 10 ]; do
              PUSH_RETRY=$((PUSH_RETRY + 1))
              if timeout 300 git push origin HEAD:"$BRANCH"; then
                echo ""
                echo "========================================"
                echo "Download complete!"
                echo "========================================"
                break
              else
                echo "Push failed, retry $PUSH_RETRY/10..."
                sleep 5
                git fetch origin "$BRANCH"
                git reset --hard origin/"$BRANCH"
              fi
            done
          fi

      - name: Show summary
        run: |
          echo "=========================================="
          echo "RavenTube Downloader"
          echo "Repository: ${{ github.repository }}"
          echo "=========================================="
