name: RavenTube - Advanced Search (HTML Output)
on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Search phrase (e.g., python tutorial)'
        required: true
        type: string
      max_results:
        description: 'Maximum results'
        required: false
        default: '10'
        type: choice
        options: ['5', '10', '20', '30', '50']
      sort_by:
        description: 'Sort by'
        required: false
        default: 'relevance'
        type: choice
        options: [relevance, upload_date, view_count, like_count, duration]
      publish_time:
        description: 'Upload date filter'
        required: false
        default: 'any'
        type: choice
        options: [any, today, this_week, this_month, this_year]
jobs:
  html_search:
    name: Search & Generate HTML Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
- name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
- name: Install yt-dlp
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
- name: Search YouTube
        env:
          QUERY: ${{ github.event.inputs.search_query }}
          MAX:   ${{ github.event.inputs.max_results }}
          TIME:  ${{ github.event.inputs.publish_time }}
        run: |
          DATE_FLAG=""
          case "$TIME" in
            today)      DATE_FLAG="--dateafter now-1day"   ;;
            this_week)  DATE_FLAG="--dateafter now-1week"  ;;
            this_month) DATE_FLAG="--dateafter now-1month" ;;
            this_year)  DATE_FLAG="--dateafter now-1year"  ;;
          esac
yt-dlp \
            --dump-json \
            --no-playlist \
            --skip-download \
            --no-warnings \
            --ignore-errors \
            $DATE_FLAG \
            "ytsearch${MAX}:${QUERY}" > raw.json || true
touch raw.json
          echo "Lines fetched: $(wc -l < raw.json)"
- name: Build HTML report
        env:
          QUERY: ${{ github.event.inputs.search_query }}
          SORT:  ${{ github.event.inputs.sort_by }}
        run: python3 .github/scripts/build_report.py
- name: Commit results
        env:
          QUERY: ${{ github.event.inputs.search_query }}
        run: |
          mkdir -p .raventube
          cp index.html .raventube/latest.html
          cp urls.txt   .raventube/urls.txt
          git config user.name  "RavenTube"
          git config user.email "raventube@users.noreply.github.com"
          git add .raventube/ index.html urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Search: ${QUERY} [skip ci]"
            git push
          fi
- name: Summary
        run: |
          echo "=========================================="
          echo "Done: https://github.com/${{ github.repository }}/blob/main/index.html"
          echo "=========================================="
