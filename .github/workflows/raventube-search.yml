name: RavenTube - Advanced Search (HTML Output)

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Search phrase (e.g., "python tutorial")'
        required: true
        type: string
      max_results:
        description: 'Maximum results'
        required: false
        default: '10'
        type: choice
        options: [5, 10, 20, 30, 50]
      sort_by:
        description: 'Sort by'
        required: false
        default: 'relevance'
        type: choice
        options: [relevance, upload_date, view_count, like_count, duration]
      publish_time:
        description: 'Upload date filter'
        required: false
        default: 'any'
        type: choice
        options: [any, today, this_week, this_month, this_year]

jobs:
  html_search:
    name: Search & Generate HTML Report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip install yt-dlp

      - name: Perform search and generate HTML
        run: |
          QUERY="${{ github.event.inputs.search_query }}"
          MAX="${{ github.event.inputs.max_results }}"
          SORT="${{ github.event.inputs.sort_by }}"
          TIME="${{ github.event.inputs.publish_time }}"

          # Build yt-dlp search string with sort and date filters
          FILTERS=""
          if [ "$TIME" != "any" ]; then
            case "$TIME" in
              today)       FILTERS=":today" ;;
              this_week)   FILTERS=":week" ;;
              this_month)  FILTERS=":month" ;;
              this_year)   FILTERS=":year" ;;
            esac
          fi
          SORT_FLAG=""
          if [ "$SORT" != "relevance" ]; then
            SORT_FLAG=":sort=$SORT"
          fi

          SEARCH_STR="ytsearch${MAX}:${QUERY}${FILTERS}${SORT_FLAG}"

          echo "Search string: $SEARCH_STR"

          # Fetch JSON metadata (richer than flat-playlist)
          yt-dlp --dump-json --no-playlist --skip-download \
            --no-warnings --no-check-certificate \
            "$SEARCH_STR" > raw.json

          # Generate HTML with Python (safe escaping)
          python3 << 'PYEOF'
import json, datetime, html, os, sys

search_query = os.environ.get("QUERY", "")
generated_at = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

cards = []
with open("raw.json", "r", encoding="utf-8") as f:
    for line in f:
        line = line.strip()
        if not line:
            continue
        try:
            vid = json.loads(line)
        except:
            continue
        vid_id = vid.get("id", "")
        title = vid.get("title", "Untitled")
        channel = vid.get("channel", "Unknown")
        upload_date = vid.get("upload_date", "")
        view_count = vid.get("view_count") or 0
        like_count = vid.get("like_count") or 0
        duration = vid.get("duration") or 0
        thumbnail = vid.get("thumbnail", "")
        webpage_url = vid.get("webpage_url", "")
        if not webpage_url and vid_id:
            webpage_url = f"https://www.youtube.com/watch?v={vid_id}"

        # Format date
        try:
            if len(upload_date) == 8:
                date_fmt = f"{upload_date[:4]}-{upload_date[4:6]}-{upload_date[6:8]}"
            else:
                date_fmt = upload_date
        except:
            date_fmt = "N/A"

        # Format numbers
        def fmt_num(n):
            try:
                n = int(n)
            except:
                return "0"
            if n >= 1_000_000:
                return f"{n/1_000_000:.1f}M"
            if n >= 1_000:
                return f"{n/1_000:.1f}K"
            return str(n)

        views_fmt = fmt_num(view_count)
        likes_fmt = fmt_num(like_count)

        # Format duration
        try:
            d = int(duration)
            mins = d // 60
            secs = d % 60
            duration_fmt = f"{mins}:{secs:02d}"
        except:
            duration_fmt = "?"

        # Escape for HTML
        title_esc = html.escape(title)
        channel_esc = html.escape(channel)
        url_esc = html.escape(webpage_url)

        card = f'''        <div class="video-card">
            <img class="thumbnail" src="{html.escape(thumbnail)}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/320x180?text=No+Thumb'">
            <div class="info">
                <a href="{url_esc}" target="_blank" class="title">{title_esc}</a>
                <div class="channel">📺 {channel_esc}</div>
                <div class="stats">
                    <span class="stat duration">⏱️ {duration_fmt}</span>
                    <span class="stat views">👁️ {views_fmt}</span>
                    <span class="stat likes">❤️ {likes_fmt}</span>
                    <span class="stat date">📅 {date_fmt}</span>
                </div>
                <a href="{url_esc}" target="_blank" class="download-btn">▶️ Watch on YouTube</a>
            </div>
        </div>'''
        cards.append(card)

total = len(cards)

html_template = f'''<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RavenTube Search Results</title>
    <style>
        * {{ margin: 0; padding: 0; box-sizing: border-box; }}
        body {{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
        }}
        .container {{ max-width: 1400px; margin: 0 auto; }}
        h1 {{
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }}
        .query-badge {{
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.2rem;
            color: #aaa;
        }}
        .video-grid {{
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }}
        .video-card {{
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }}
        .video-card:hover {{
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: #4ecdc4;
        }}
        .thumbnail {{
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #0a0a1a;
        }}
        .info {{
            padding: 15px;
        }}
        .title {{
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #4ecdc4;
            text-decoration: none;
            display: block;
        }}
        .title:hover {{ text-decoration: underline; }}
        .channel {{
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }}
        .stats {{
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.75rem;
            color: #ccc;
            margin: 10px 0;
        }}
        .stat {{ background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 20px; }}
        .duration {{ background: rgba(78,205,196,0.2); }}
        .views {{ background: rgba(255,107,107,0.2); }}
        .likes {{ background: rgba(78,205,196,0.2); }}
        .date {{ background: rgba(255,193,7,0.2); }}
        .download-btn {{
            display: inline-block;
            background: linear-gradient(45deg, #ff6b6b, #c92a2a);
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-top: 10px;
            transition: opacity 0.2s;
        }}
        .download-btn:hover {{ opacity: 0.8; }}
        .footer {{
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: #666;
            font-size: 0.8rem;
        }}
        @media (max-width: 700px) {{
            .video-grid {{ grid-template-columns: 1fr; }}
        }}
    </style>
</head>
<body>
<div class="container">
    <h1>🪶 RavenTube Search Results</h1>
    <div class="query-badge">
        🔍 <strong>{html.escape(search_query)}</strong> &nbsp;|&nbsp;
        📅 {generated_at} &nbsp;|&nbsp;
        🎯 {total} videos
    </div>
    <div class="video-grid">
'''

html_template += '\n'.join(cards) + '''
    </div>
    <div class="footer">
        🐦‍⬛ RavenTube — Free YouTube Search & Download<br>
        Generated by GitHub Actions
    </div>
</div>
</body>
</html>'''

with open("search_results.html", "w", encoding="utf-8") as f:
    f.write(html_template)

# Extract clean URLs
with open("selected_urls.txt", "w") as f:
    for card_line in cards:
        # crude extraction: get the first href from each card
        import re
        match = re.search(r'href="([^"]+)"', card_line)
        if match:
            f.write(match.group(1) + "\n")

print(f"Generated HTML with {total} videos")
PYEOF

      - name: Save to repository
        run: |
          mkdir -p .raventube
          cp search_results.html .raventube/latest_search.html
          cp selected_urls.txt .raventube/latest_urls.txt
          cp search_results.html index.html

          git config user.name "RavenTube-Search"
          git config user.email "search@raventube"
          git add .raventube/ index.html
          git diff --cached --quiet || git commit -m "RavenTube: HTML search results for '${{ github.event.inputs.search_query }}' [skip ci]"
          git push

      - name: Show summary
        run: |
          echo "=========================================="
          echo "🎉 Search complete!"
          echo "📄 HTML report: https://github.com/${{ github.repository }}/blob/main/index.html"
          echo "=========================================="m
