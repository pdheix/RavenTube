name: RavenTube - Advanced Search (HTML Output)
on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Search phrase (e.g., "python tutorial")'
        required: true
        type: string
      max_results:
        description: 'Maximum results'
        required: false
        default: '10'
        type: choice
        options: ['5', '10', '20', '30', '50']
      sort_by:
        description: 'Sort by'
        required: false
        default: 'relevance'
        type: choice
        options: [relevance, upload_date, view_count, like_count, duration]
      publish_time:
        description: 'Upload date filter'
        required: false
        default: 'any'
        type: choice
        options: [any, today, this_week, this_month, this_year]
jobs:
  html_search:
    name: Search & Generate HTML Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
- name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
- name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp
- name: Search YouTube
        env:
          QUERY: ${{ github.event.inputs.search_query }}
          MAX: ${{ github.event.inputs.max_results }}
          TIME: ${{ github.event.inputs.publish_time }}
        run: |
          # Map publish_time to yt-dlp --dateafter
          DATE_FLAG=""
          case "$TIME" in
            today)      DATE_FLAG="--dateafter now-1day" ;;
            this_week)  DATE_FLAG="--dateafter now-1week" ;;
            this_month) DATE_FLAG="--dateafter now-1month" ;;
            this_year)  DATE_FLAG="--dateafter now-1year" ;;
          esac
yt-dlp \
            --dump-json \
            --no-playlist \
            --skip-download \
            --no-warnings \
            --ignore-errors \
            $DATE_FLAG \
            "ytsearch${MAX}:${QUERY}" > raw.json || true
# Ensure file exists even if no results
          touch raw.json
          echo "Lines fetched: $(wc -l < raw.json)"
- name: Build HTML report
        env:
          QUERY: ${{ github.event.inputs.search_query }}
          SORT: ${{ github.event.inputs.sort_by }}
        run: |
          cat > build.py << 'PYEOF'
          import json, os, html, datetime
query = os.environ.get("QUERY", "")
          sort_by = os.environ.get("SORT", "relevance")
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
videos = []
          try:
              with open("raw.json") as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      try:
                          videos.append(json.loads(line))
                      except json.JSONDecodeError:
                          continue
          except FileNotFoundError:
              pass
# Sort
          sort_keys = {
              "upload_date": lambda v: v.get("upload_date") or "",
              "view_count":  lambda v: int(v.get("view_count") or 0),
              "like_count":  lambda v: int(v.get("like_count") or 0),
              "duration":    lambda v: int(v.get("duration") or 0),
          }
          if sort_by in sort_keys:
              videos.sort(key=sort_keys[sort_by], reverse=True)
rows = []
          urls = []
          for i, v in enumerate(videos, 1):
              title = html.escape(v.get("title") or "?")
              dur = int(v.get("duration") or 0)
              views = int(v.get("view_count") or 0)
              date = (v.get("upload_date") or "")[:10]
              url = v.get("webpage_url") or f"https://youtu.be/{v.get('id','')}"
              url_esc = html.escape(url, quote=True)
              rows.append(
                  f'<tr><td>{i}</td><td><a href="{url_esc}">{title}</a></td>'
                  f'<td>{date}</td><td>{views:,}</td>'
                  f'<td>{dur//60}:{dur%60:02d}</td></tr>'
              )
              urls.append(url)
q_esc = html.escape(query)
          rows_html = "\n".join(rows) if rows else '<tr><td colspan="5">No results</td></tr>'
page = f"""<!DOCTYPE html>
          <html lang="en"><head><meta charset="UTF-8"><title>RavenTube: {q_esc}</title>
          <style>
          body{{font:14px/1.4 monospace;background:#111;color:#ccc;padding:20px}}
          h1{{color:#4ecdc4}}
          table{{border-collapse:collapse;width:100%}}
          th,td{{border:1px solid #333;padding:6px 10px;text-align:left}}
          th{{background:#222}}
          a{{color:#ff6b6b;text-decoration:none}}
          a:hover{{text-decoration:underline}}
          </style></head><body>
          <h1>RavenTube: {q_esc}</h1>
          <p>{now} — {len(videos)} results — sorted by {html.escape(sort_by)}</p>
          <table>
          <tr><th>#</th><th>Title</th><th>Date</th><th>Views</th><th>Dur</th></tr>
          {rows_html}
          </table></body></html>"""
with open("index.html", "w") as f:
              f.write(page)
          with open("urls.txt", "w") as f:
              f.write("\n".join(urls))
print(f"Generated index.html with {len(videos)} entries")
          PYEOF
python3 build.py
- name: Commit results
        env:
          QUERY: ${{ github.event.inputs.search_query }}
        run: |
          mkdir -p .raventube
          cp index.html .raventube/latest.html
          cp urls.txt  .raventube/urls.txt
          git config user.name  "RavenTube"
          git config user.email "raventube@users.noreply.github.com"
          git add .raventube/ index.html urls.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Search: ${QUERY} [skip ci]"
            git push
          fi
- name: Summary
        run: |
          echo "=========================================="
          echo "Done: https://github.com/${{ github.repository }}/blob/main/index.html"
          echo "=========================================="
