name: RavenTube

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'YouTube URL(s) or search query (space separated)'
        required: true
        type: string
      quality:
        description: 'Video quality'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 1080
          - 720
          - 480
          - audio
      download_subtitles:
        description: 'Download subtitles'
        required: false
        default: false
        type: boolean
      password:
        description: 'ZIP password (optional)'
        required: false
        default: ''
        type: string

jobs:
  download:
    name: Download YouTube Videos
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Check input
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "No URL provided"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "RavenTube"
          git config user.email "raventube@local"

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip
          pip3 install --upgrade yt-dlp

      - name: Download videos
        env:
          URLS: ${{ github.event.inputs.video_urls }}
          QUALITY: ${{ github.event.inputs.quality }}
          PASSWORD: ${{ github.event.inputs.password }}
          SUBS: ${{ github.event.inputs.download_subtitles }}
        run: |
          # Set format based on quality
          if [ "$QUALITY" = "audio" ]; then
            FORMAT="bestaudio/best"
          elif [ "$QUALITY" = "best" ]; then
            FORMAT="bestvideo+bestaudio/best"
          else
            FORMAT="bestvideo[height<="${QUALITY}"]+bestaudio/best"
          fi

          # Create videos directory
          mkdir -p videos

          # Process each URL
          for URL in $URLS; do
            echo "Processing: $URL"

            # Handle search queries
            if [[ ! "$URL" =~ ^https?:// ]]; then
              URL="ytsearch1:$URL"
            fi

            # Download with retries
            for i in 1 2 3; do
              if yt-dlp -f "$FORMAT" \
                --merge-output-format mp4 \
                --write-thumbnail \
                --convert-thumbnails jpg \
                --output "videos/%(title)s.%(ext)s" \
                --no-playlist \
                --retries 5 \
                "$URL"; then
                break
              fi
              sleep 5
            done
          done

          # Handle password protection
          if [ -n "$PASSWORD" ]; then
            for file in videos/*.mp4 videos/*.webm; do
              [ -f "$file" ] || continue
              zip -P "$PASSWORD" "${file}.zip" "$file"
              rm "$file"
            done
          fi

      - name: Push to repository
        run: |
          git add videos/
          git diff --cached --quiet || git commit -m "RavenTube: add videos [skip ci]"
          git push
